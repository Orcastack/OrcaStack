stages:
  - validate
  - automate
  - package
  - govern
  - release

variables:
  GIT_STRATEGY: clone

api-build:
  stage: validate
  image: golang:1.23
  script:
    - cd orcastackapi
    - go mod tidy
    - go build ./...
  only:
    - merge_requests
    - main

api-test:
  stage: validate
  image: golang:1.23
  script:
    - cd orcastackapi
    - go test ./...
  only:
    - merge_requests
    - main

web-build:
  stage: validate
  image: node:20-alpine
  script:
    - cd orcastackweb
    - npm install
    - npm run build
  artifacts:
    paths:
      - orcastackweb/dist/
    expire_in: 1 hour
  only:
    - merge_requests
    - main

infra-validate:
  stage: validate
  image: hashicorp/terraform:1.8
  script:
    - terraform -chdir=infra/terraform/environments/private-cloud init -backend=false
    - terraform -chdir=infra/terraform/environments/private-cloud validate
    - terraform fmt -check -recursive infra/terraform
  only:
    - merge_requests
    - main

cloud-automation-blueprint:
  stage: automate
  image: cytopia/ansible:latest-tools
  script:
    - ansible-playbook --syntax-check -i infra/ansible/inventories/private-cloud/hosts.yml infra/ansible/playbooks/proxmox-bootstrap.yml
    - ansible-playbook --syntax-check -i infra/ansible/inventories/private-cloud/hosts.yml infra/ansible/playbooks/openstack-control-plane.yml
    - ansible-playbook --syntax-check -i infra/ansible/inventories/private-cloud/hosts.yml infra/ansible/playbooks/network-fabric.yml
    - ansible-playbook --syntax-check -i infra/ansible/inventories/private-cloud/hosts.yml infra/ansible/playbooks/kubernetes-cluster.yml
    - ansible-playbook --syntax-check -i infra/ansible/inventories/private-cloud/hosts.yml infra/ansible/playbooks/rancher-register.yml
    - ansible-playbook --syntax-check -i infra/ansible/inventories/private-cloud/hosts.yml infra/ansible/playbooks/gpu-workers.yml
  only:
    - merge_requests
    - main

cloud-manifests:
  stage: automate
  image: bitnami/kubectl:1.31
  script:
    - kubectl kustomize infra/kubernetes/platform >/tmp/orcastack-platform.yaml
    - test -s /tmp/orcastack-platform.yaml
  only:
    - merge_requests
    - main

deploy-cloud-foundation:
  stage: govern
  image: cytopia/ansible:latest-tools
  script:
    - ansible-playbook -i infra/ansible/inventories/private-cloud/hosts.yml infra/ansible/playbooks/proxmox-bootstrap.yml
    - ansible-playbook -i infra/ansible/inventories/private-cloud/hosts.yml infra/ansible/playbooks/openstack-control-plane.yml
    - ansible-playbook -i infra/ansible/inventories/private-cloud/hosts.yml infra/ansible/playbooks/network-fabric.yml
    - ansible-playbook -i infra/ansible/inventories/private-cloud/hosts.yml infra/ansible/playbooks/kubernetes-cluster.yml
    - ansible-playbook -i infra/ansible/inventories/private-cloud/hosts.yml infra/ansible/playbooks/rancher-register.yml
    - ansible-playbook -i infra/ansible/inventories/private-cloud/hosts.yml infra/ansible/playbooks/gpu-workers.yml
  when: manual
  only:
    - main

artifact-sign:
  stage: package
  image: golang:1.23
  script:
    - cd orcastackapi
    - mkdir -p dist/signing dist/attestations
    - go build -o dist/orcastack-cd-service ./cmd/orcastack-cd-service
    - go run ./cmd/orcastack-secctl genkeys --private dist/signing/private.pem --public dist/signing/public.pem
    - go run ./cmd/orcastack-secctl attest --repository-identity "$ORCASTACK_REPOSITORY_IDENTITY" --component-identity orca:service:dd3490dc-e08d-43bb-abaf-2874e46ad7ec --binary-path dist/orcastack-cd-service --build-reference "${CI_COMMIT_SHA}:orcastack-cd-service" --private-key dist/signing/private.pem --public-key dist/signing/public.pem --output dist/attestations/cd-service.json
  only:
    - merge_requests
    - main

policy-gate:
  stage: govern
  image: openpolicyagent/opa:0.68.0-static
  script:
    - opa eval --fail-defined --data infra/policy/opa/runtime-governance.rego --input infra/policy/examples/prod-approval-input.json 'data.orcastack.runtime.deny'
  only:
    - merge_requests
    - main

release-packages:
  stage: release
  image: golang:1.24
  before_script:
    - apt-get update
    - apt-get install -y rpm dpkg-dev apt-utils gnupg
  script:
    - bash ./scripts/release/build-release.sh "${CI_COMMIT_TAG#v}"
    - bash ./scripts/release/update-apt-repo.sh "${CI_COMMIT_TAG#v}"
  only:
    - tags
