# GitHub Pages deployment workflow
name: Deploy orcastack to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]
    paths:
      - '.github/workflows/jekyll-gh-pages.yml'
      - 'orcastackweb/**'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    env:
      ORCASTACK_REPOSITORY_IDENTITY: orca:repo:3f6d8c3e-6c96-4d8c-a2d3-6f4a8f4b7f2a
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: orcastackweb/package-lock.json
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.23'
      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - name: Install frontend dependencies
        working-directory: orcastackweb
        run: npm ci
      - name: Build frontend
        working-directory: orcastackweb
        env:
          ORCASTACK_WEB_BASE: /${{ github.event.repository.name }}/
        run: npm run build
      - name: Generate Pages signing keys
        run: |
          cd orcastackapi
          mkdir -p dist/pages-signing
          go run ./cmd/orcastack-secctl genkeys --private dist/pages-signing/private.pem --public dist/pages-signing/public.pem
      - name: Generate Pages attestation
        run: |
          cd orcastackapi
          go run ./cmd/orcastack-secctl attest --repository-identity "$ORCASTACK_REPOSITORY_IDENTITY" --component-identity orca:service:6fb4b8d3-32e3-4725-bd52-db9f5a6d0f14 --binary-path ../orcastackweb/dist/index.html --build-reference "${GITHUB_SHA}:pages" --private-key dist/pages-signing/private.pem --public-key dist/pages-signing/public.pem --output ../orcastackweb/dist/orca-attestation.json
          cp dist/pages-signing/public.pem ../orcastackweb/dist/orca-public.pem
      - name: Archive Pages artifact
        run: |
          tar \
            --dereference --hard-dereference \
            --directory orcastackweb/dist \
            -cvf "$RUNNER_TEMP/github-pages.tar" \
            --exclude=.git \
            --exclude=.github \
            .
      - name: Upload Pages artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: github-pages
          path: ${{ runner.temp }}/github-pages.tar
          retention-days: 1
          if-no-files-found: error

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
