name: gitorc validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  api-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Build API services
      run: |
        cd gitorcapi
        go mod tidy
        go build ./...

  web-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: gitorcweb/package-lock.json

    - name: Install dependencies
      run: |
        cd gitorcweb
        npm ci

    - name: Build frontend
      run: |
        cd gitorcweb
        npm run build
