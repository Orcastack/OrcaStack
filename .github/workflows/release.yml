name: orcastack release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GPG_KEY_ID: ${{ vars.ORCASTACK_GPG_KEY_ID }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.24'

      - name: Install release tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm dpkg-dev apt-utils gnupg

      - name: Import signing key
        if: secrets.ORCASTACK_GPG_PRIVATE_KEY != ''
        env:
          ORCASTACK_GPG_PRIVATE_KEY: ${{ secrets.ORCASTACK_GPG_PRIVATE_KEY }}
        run: |
          printf '%s' "$ORCASTACK_GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Build release artifacts
        run: bash ./scripts/release/build-release.sh "${GITHUB_REF_NAME#v}"

      - name: Build apt repository
        run: bash ./scripts/release/update-apt-repo.sh "${GITHUB_REF_NAME#v}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/release/packages/orcastack.deb
            dist/release/packages/orcastack.deb.sha256
            dist/release/packages/orcastack.deb.asc
            dist/release/packages/orcastack.rpm
            dist/release/packages/orcastack.rpm.sha256
            dist/release/packages/orcastack.rpm.asc
            dist/release/packages/orcastack.tar.gz
            dist/release/packages/orcastack.tar.gz.sha256
            dist/release/packages/orcastack.tar.gz.asc

      - name: Publish apt repository
        uses: peaceiris/actions-gh-pages@329bcc8f12caed2cefe5a5b80781499a6f3b361b # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist/release/apt
          destination_dir: apt