apiVersion: v1
kind: ConfigMap
metadata:
  name: orcastack-self-hosting
data:
  bootstrap-mode: sovereign-private-cloud
  upgrade-strategy: rolling
  self-monitoring: prometheus-grafana
  operator-panels: control-panel,repositories,clusters,pipelines,monitoring,identity,cloud-tools
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: orcastack-self-monitor
spec:
  schedule: "*/15 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: orcastack-runner
          containers:
            - name: self-monitor
              image: curlimages/curl:8.8.0
              command:
                - /bin/sh
                - -c
                - |
                  echo "Checking ORCASTACK self-hosting endpoints" && \
                  echo "gateway=https://orcastack.internal.example/healthz" && \
                  echo "grafana=https://grafana.internal.example" && \
                  echo "prometheus=https://prometheus.internal.example"
