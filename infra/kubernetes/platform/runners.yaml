apiVersion: v1
kind: ServiceAccount
metadata:
  name: orcastack-runner
  annotations:
    orcastack.io/identity-mode: keystone-linked
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orcastack-runner-controller
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orcastack-runner-controller
  template:
    metadata:
      labels:
        app: orcastack-runner-controller
        orcastack.io/scheduling: private-cloud
    spec:
      serviceAccountName: orcastack-runner
      containers:
        - name: runner-controller
          image: registry.internal.example/orcastack/runner-controller:latest
          args:
            - --queue=governed-pipelines
            - --identity-provider=keystone
            - --executor=kubernetes
            - --artifact-volume=/var/lib/orcastack/artifacts
          volumeMounts:
            - name: artifacts
              mountPath: /var/lib/orcastack/artifacts
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: orcastack-artifacts