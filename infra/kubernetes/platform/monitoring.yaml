apiVersion: v1
kind: ConfigMap
metadata:
  name: orcastack-prometheus-scrape
data:
  prometheus-additional.yaml: |
    - job_name: orcastack-api
      kubernetes_sd_configs:
        - role: pod
      relabel_configs:
        - source_labels: [__meta_kubernetes_pod_label_app]
          regex: orcastack-(gateway|git-service|review-service|ci-service|cd-service|analytics-service)
          action: keep
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orcastack-metrics-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orcastack-metrics-agent
  template:
    metadata:
      labels:
        app: orcastack-metrics-agent
    spec:
      containers:
        - name: metrics-agent
          image: registry.internal.example/observability/prometheus-agent:latest
          args:
            - --config=/etc/prometheus/prometheus-additional.yaml
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: orcastack-prometheus-scrape