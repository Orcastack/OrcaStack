apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: orcastack-verify-attestations
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: require-signed-orcastack-images
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - orcastack-system
      verifyImages:
        - imageReferences:
            - "registry.internal.example/orcastack/*"
          attestors:
            - count: 1
              entries:
                - keys:
                    publicKeys: |-
                      -----BEGIN PUBLIC KEY-----
                      REPLACE_WITH_PLATFORM_SIGNING_KEY
                      -----END PUBLIC KEY-----
          mutateDigest: true
          required: true