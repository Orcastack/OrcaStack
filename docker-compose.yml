services:
  postgres:
    image: postgres:16-alpine
    container_name: gitorc-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gitorc}
      POSTGRES_USER: ${POSTGRES_USER:-gitorc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gitorc}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gitorc} -d ${POSTGRES_DB:-gitorc}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.10
    container_name: gitorc-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=localhost:8082
    ports:
      - "19092:19092"
      - "9644:9644"

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: gitorc-namenode
    environment:
      CLUSTER_NAME: gitorc-hadoop
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - hadoop_namenode:/hadoop/dfs/name

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: gitorc-datanode
    environment:
      SERVICE_PRECONDITION: namenode:9870
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    ports:
      - "9864:9864"
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    depends_on:
      - namenode

  hbase:
    image: harisekhon/hbase:2.4
    container_name: gitorc-hbase
    environment:
      HBASE_MANAGES_ZK: "true"
    ports:
      - "16010:16010"
      - "9090:9090"
      - "2181:2181"
    depends_on:
      - namenode

  gateway:
    image: golang:1.23
    container_name: gitorc-gateway
    working_dir: /workspace/gitorcapi
    command: sh -c "go mod download && go run ./cmd/gitorc-gateway"
    volumes:
      - ./gitorcapi:/workspace/gitorcapi
    environment:
      GITORC_GATEWAY_HTTP_PORT: 8080
      GITORC_GATEWAY_GRPC_PORT: 9080
    ports:
      - "8080:8080"
      - "9080:9080"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started

  git-service:
    image: golang:1.23
    container_name: gitorc-git-service
    working_dir: /workspace/gitorcapi
    command: sh -c "go mod download && go run ./cmd/gitorc-git-service"
    volumes:
      - ./gitorcapi:/workspace/gitorcapi
      - ./infra/git/repos:/srv/git
    environment:
      GITORC_GIT_HTTP_PORT: 8081
      GITORC_GIT_GRPC_PORT: 9081
    ports:
      - "8081:8081"
      - "9081:9081"
    depends_on:
      postgres:
        condition: service_healthy

  review-service:
    image: golang:1.23
    container_name: gitorc-review-service
    working_dir: /workspace/gitorcapi
    command: sh -c "go mod download && go run ./cmd/gitorc-review-service"
    volumes:
      - ./gitorcapi:/workspace/gitorcapi
    environment:
      GITORC_REVIEW_HTTP_PORT: 8082
      GITORC_REVIEW_GRPC_PORT: 9082
    ports:
      - "8086:8082"
      - "9082:9082"
    depends_on:
      git-service:
        condition: service_started

  ci-service:
    image: golang:1.23
    container_name: gitorc-ci-service
    working_dir: /workspace/gitorcapi
    command: sh -c "go mod download && go run ./cmd/gitorc-ci-service"
    volumes:
      - ./gitorcapi:/workspace/gitorcapi
      - ./infra/artifacts:/workspace/artifacts
    environment:
      GITORC_CI_HTTP_PORT: 8083
      GITORC_CI_GRPC_PORT: 9083
    ports:
      - "8083:8083"
      - "9083:9083"
    depends_on:
      redpanda:
        condition: service_started
      hbase:
        condition: service_started

  cd-service:
    image: golang:1.23
    container_name: gitorc-cd-service
    working_dir: /workspace/gitorcapi
    command: sh -c "go mod download && go run ./cmd/gitorc-cd-service"
    volumes:
      - ./gitorcapi:/workspace/gitorcapi
      - ./infra/deploy:/workspace/deploy
    environment:
      GITORC_CD_HTTP_PORT: 8084
      GITORC_CD_GRPC_PORT: 9084
    ports:
      - "8084:8084"
      - "9084:9084"
    depends_on:
      ci-service:
        condition: service_started

  analytics-service:
    image: golang:1.23
    container_name: gitorc-analytics-service
    working_dir: /workspace/gitorcapi
    command: sh -c "go mod download && go run ./cmd/gitorc-analytics-service"
    volumes:
      - ./gitorcapi:/workspace/gitorcapi
    environment:
      GITORC_ANALYTICS_HTTP_PORT: 8085
      GITORC_ANALYTICS_GRPC_PORT: 9085
    ports:
      - "8085:8085"
      - "9085:9085"
    depends_on:
      hbase:
        condition: service_started

  web:
    image: node:20-alpine
    container_name: gitorc-web
    working_dir: /workspace/gitorcweb
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./gitorcweb:/workspace/gitorcweb
      - gitorcweb_node_modules:/workspace/gitorcweb/node_modules
    ports:
      - "5173:5173"
    depends_on:
      gateway:
        condition: service_started

volumes:
  postgres_data:
  hadoop_namenode:
  hadoop_datanode:
  gitorcweb_node_modules:

services:
  redis:
    image: redis:7-alpine
    container_name: profile_redis
    ports:
      - "6379:6379"
    networks:
      - app-network

  db:
    image: postgres:15
    container_name: profile_db
    environment:
      POSTGRES_DB: ${DB_NAME:-personal_brand_hub}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: profile_backend
    restart: unless-stopped
    user: "1000:1000"
    command: ["sh", "/app/init.sh"]
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - sessions_volume:/app/sessions
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys;\n\ntry:\n    resp=urllib.request.urlopen('http://localhost:8000/api/status/', timeout=3)\n    sys.exit(0 if (200 <= resp.status < 400) else 1)\nexcept Exception:\n    sys.exit(1)\" "]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    environment:
      - DEBUG=${DEBUG:-True}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      # IMPORTANT: root .env is the single source of configuration; Docker overrides DATABASE_URL for Postgres.
      # Override it inside Docker so the container uses Postgres.
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-personal_brand_hub}
      - DB_NAME=${DB_NAME:-personal_brand_hub}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_WAIT_SECONDS=${DB_WAIT_SECONDS:-180}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GITHUB_REDIRECT_URI=${GITHUB_REDIRECT_URI:-}
      - GITLAB_CLIENT_ID=${GITLAB_CLIENT_ID:-}
      - GITLAB_CLIENT_SECRET=${GITLAB_CLIENT_SECRET:-}
      - GITLAB_REDIRECT_URI=${GITLAB_REDIRECT_URI:-}
      - LINKEDIN_CLIENT_ID=${LINKEDIN_CLIENT_ID:-}
      - LINKEDIN_CLIENT_SECRET=${LINKEDIN_CLIENT_SECRET:-}
      - LINKEDIN_REDIRECT_URI=${LINKEDIN_REDIRECT_URI:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL:-}
    container_name: profile_frontend
    volumes:
      # - ./frontend:/app  # Commented out to prevent overwriting build output
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      # IMPORTANT: do not default to localhost here.
      # If set to localhost, phones/tablets will call *their own* localhost and the app will appear broken.
      # Leave unset to let the frontend derive the API base URL from window.location.hostname,
      # or explicitly set REACT_APP_API_URL=http://<YOUR_LAN_IP>:8000/api for LAN testing.
      - REACT_APP_API_URL=${REACT_APP_API_URL:-}
      - NODE_ENV=${NODE_ENV:-development}
      - WATCHPACK_POLLING=true
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  postgres_data:
  static_volume:
  media_volume:
  sessions_volume:

networks:
  app-network:
    driver: bridge
